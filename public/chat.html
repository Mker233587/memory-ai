<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>记忆助理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .header { background: #1e293b; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
    .header h3 { font-size: 1.2rem; }
    .chat-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; }
    .user { align-self: flex-end; background: #2563eb; color: #fff; }
    .assistant { align-self: flex-start; background: #334155; }
    .input-area { display: flex; padding: 12px; background: #1e293b; border-top: 1px solid #334155; }
    .input-area input { flex: 1; padding: 12px; border-radius: 24px; border: none; background: #0f172a; color: #f8fafc; font-size: 1rem; outline: none; }
    .input-area button { margin-left: 8px; padding: 12px 20px; border-radius: 24px; border: none; background: #2563eb; color: #fff; font-size: 1rem; }
    .loading { align-self: flex-start; color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h3>🧠 记忆助理</h3>
    <button onclick="logout()" style="background:#ef4444;border:none;color:#fff;padding:6px 12px;border-radius:8px;">退出</button>
  </div>
  <div class="chat-container" id="c"></div>
  <div class="input-area">
    <input type="text" id="m" placeholder="输入消息..." autocomplete="off">
    <button id="b">发送</button>
  </div>
  <script>
    const API_BASE = 'https://你的Worker地址.workers.dev'; // 修改为Worker地址或自定义域名
    const token = localStorage.getItem('token');
    if (!token) location.href = 'login.html';
    let cId = null, sessionId = Date.now().toString();

    function logout() { localStorage.clear(); location.href = 'login.html'; }
    function add(text, role) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = text;
      c.appendChild(div);
      c.scrollTop = c.scrollHeight;
    }
    b.onclick = async () => {
      const t = m.value.trim();
      if (!t) return;
      add(t, 'user');
      m.value = '';
      const l = document.createElement('div');
      l.className = 'loading';
      l.textContent = '思考中...';
      c.appendChild(l);
      c.scrollTop = c.scrollHeight;
      try {
        const res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body: JSON.stringify({ message: t, conversationId: cId, sessionId })
        });
        const d = await res.json();
        l.remove();
        if (d.reply) {
          add(d.reply, 'assistant');
          if (d.conversationId) cId = d.conversationId;
        } else add('出错', 'assistant');
      } catch(e) {
        l.remove();
        add('网络错误', 'assistant');
      }
    };
    m.onkeypress = e => { if (e.key === 'Enter') b.click(); };
  </script>
</body>
</html>
